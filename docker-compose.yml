version: "3.9"

# ============================================================
#  SentinelCore - Stack Completa (Backend + Frontend)
#  Sobe tudo com: docker compose up -d --build
# ============================================================

services:

  # ---- Frontend React ----
  frontend:
    build: ./frontend
    container_name: sentinelcore-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    networks:
      - sentinelcore

  # ---- Backend FastAPI ----
  backend:
    build: ./backend
    container_name: sentinelcore-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://sentinel:sentinel@postgres:5432/sentinelcore
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_URL=http://ollama:11434
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL}
      - N8N_WEBHOOK_BASE=http://n8n:5678/webhook
      - GRAFANA_URL=http://grafana:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentinelcore

  # ---- PostgreSQL + TimescaleDB ----
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: sentinelcore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB:       sentinelcore
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinelcore"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinelcore

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: sentinelcore-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinelcore

  # ---- Ollama (LLM local) ----
  ollama:
    image: ollama/ollama:latest
    container_name: sentinelcore-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - sentinelcore

  # ---- Grafana ----
  grafana:
    image: grafana/grafana:latest
    container_name: sentinelcore-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-sentinel123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - sentinelcore

  # ---- Prometheus ----
  prometheus:
    image: prom/prometheus:latest
    container_name: sentinelcore-prometheus
    restart: unless-stopped
    volumes:
      - ./backend/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - sentinelcore

  # ---- Pushgateway ----
  pushgateway:
    image: prom/pushgateway:latest
    container_name: sentinelcore-pushgateway
    restart: unless-stopped
    ports:
      - "9091:9091"
    networks:
      - sentinelcore

  # ---- n8n ----
  n8n:
    image: n8nio/n8n:latest
    container_name: sentinelcore-n8n
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-sentinel123}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=sentinel
      - DB_POSTGRESDB_PASSWORD=sentinel
      - WEBHOOK_URL=http://n8n:5678/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-sentinel-key-change-in-prod}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    depends_on:
      - postgres
    networks:
      - sentinelcore

# ============================================================
#  VOLUMES
# ============================================================
volumes:
  postgres_data:
  redis_data:
  ollama_data:
  grafana_data:
  prometheus_data:
  n8n_data:

# ============================================================
#  REDE INTERNA
# ============================================================
networks:
  sentinelcore:
    driver: bridge
